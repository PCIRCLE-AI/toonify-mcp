<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600;700&amp;family=IBM+Plex+Sans:wght@300;400;500;600&amp;display=swap');
    </style>
    <linearGradient id="blueLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="numGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#2563EB"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#F8FAFC"/>

  <!-- Top blue bar -->
  <rect x="0" y="0" width="1280" height="6" fill="url(#blueLine)"/>

  <!-- Left column -->
  <!-- Label -->
  <text x="80" y="130" font-family="'JetBrains Mono', monospace" font-size="12" fill="#2563EB" letter-spacing="3" font-weight="600">CLAUDE CODE PLUGIN</text>

  <!-- Title -->
  <text x="80" y="210" font-family="'JetBrains Mono', monospace" font-size="72" fill="#0F172A" font-weight="700" letter-spacing="-2">Toonify MCP</text>

  <!-- Tagline -->
  <text x="80" y="258" font-family="'IBM Plex Sans', sans-serif" font-size="24" fill="#475569" font-weight="400">Context compression for Claude Code.</text>
  <text x="80" y="292" font-family="'IBM Plex Sans', sans-serif" font-size="24" fill="#475569" font-weight="400">Runs automatically. Zero config.</text>

  <!-- Horizontal rule -->
  <rect x="80" y="324" width="480" height="2" fill="#E2E8F0"/>

  <!-- Feature list -->
  <text x="80" y="366" font-family="'IBM Plex Sans', sans-serif" font-size="18" fill="#64748B">
    <tspan fill="#2563EB">▸</tspan>  JSON · CSV · YAML · API responses
  </text>
  <text x="80" y="398" font-family="'IBM Plex Sans', sans-serif" font-size="18" fill="#64748B">
    <tspan fill="#2563EB">▸</tspan>  Stack traces · Test failures · Logs
  </text>
  <text x="80" y="430" font-family="'IBM Plex Sans', sans-serif" font-size="18" fill="#64748B">
    <tspan fill="#2563EB">▸</tspan>  TypeScript · Python · Go · PHP
  </text>

  <!-- Bottom badges -->
  <rect x="80" y="474" width="96" height="30" rx="15" fill="#EFF6FF"/>
  <text x="128" y="494" font-family="'IBM Plex Sans', sans-serif" font-size="13" fill="#2563EB" text-anchor="middle" font-weight="500">Open source</text>

  <rect x="186" y="474" width="96" height="30" rx="15" fill="#EFF6FF"/>
  <text x="234" y="494" font-family="'IBM Plex Sans', sans-serif" font-size="13" fill="#2563EB" text-anchor="middle" font-weight="500">Local-first</text>

  <rect x="292" y="474" width="64" height="30" rx="15" fill="#EFF6FF"/>
  <text x="324" y="494" font-family="'IBM Plex Sans', sans-serif" font-size="13" fill="#2563EB" text-anchor="middle" font-weight="500">MIT</text>

  <!-- Vertical divider -->
  <rect x="640" y="48" width="1" height="544" fill="#E2E8F0"/>

  <!-- Right column: big stat -->
  <text x="960" y="140" font-family="'IBM Plex Sans', sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle" letter-spacing="2" font-weight="500">BENCHMARK RESULTS</text>

  <!-- Big number -->
  <text x="960" y="300" font-family="'JetBrains Mono', monospace" font-size="148" fill="url(#numGrad)" text-anchor="middle" font-weight="700">48%</text>

  <!-- Subtext -->
  <text x="960" y="348" font-family="'IBM Plex Sans', sans-serif" font-size="20" fill="#475569" text-anchor="middle">average token savings</text>
  <text x="960" y="376" font-family="'IBM Plex Sans', sans-serif" font-size="16" fill="#94A3B8" text-anchor="middle">across JSON, debug output, and source files</text>

  <!-- Range stat -->
  <rect x="780" y="416" width="360" height="56" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="960" y="439" font-family="'JetBrains Mono', monospace" font-size="13" fill="#94A3B8" text-anchor="middle">observed range</text>
  <text x="960" y="462" font-family="'JetBrains Mono', monospace" font-size="18" fill="#1E293B" text-anchor="middle" font-weight="600">24.5% – 66.3%</text>

  <!-- URL -->
  <text x="960" y="556" font-family="'IBM Plex Sans', sans-serif" font-size="14" fill="#CBD5E1" text-anchor="middle">toonify.pcircle.ai</text>
</svg>
